      responses:
        '200':
          description: Staff performance data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: string, format: uuid }
                        full_name: { type: string }
                        leads_handled: { type: integer }
                        deals_closed: { type: integer }
                        conversion_rate: { type: number }
                        avg_response_time_hours: { type: number }
                        revenue_generated: { $ref: '#/components/schemas/BdtAmount', nullable: true }

  /analytics/maestro/insights:
    get:
      tags: [Analytics]
      summary: Get Maestro AI insights (Manager+ only)
      description: Returns top 5 insights from last nightly run. Sorted by priority.
      security:
        - DealerBearer: []
      responses:
        '200':
          description: Maestro insights
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MaestroInsight' }

  /analytics/maestro/insights/{id}/action:
    post:
      tags: [Analytics]
      summary: Mark Maestro insight as actioned
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Insight marked actioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/MaestroInsight' }

  /analytics/maestro/insights/{id}/dismiss:
    post:
      tags: [Analytics]
      summary: Dismiss Maestro insight
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Insight dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/MaestroInsight' }

  /analytics/daily-summaries:
    get:
      tags: [Analytics]
      summary: Get daily summary history (Manager+ only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: limit
          in: query
          schema: { type: integer, default: 7, maximum: 30 }
      responses:
        '200':
          description: List of past daily summaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date }
                        units_sold: { type: integer }
                        revenue_bdt: { $ref: '#/components/schemas/BdtAmount', nullable: true }
                        new_leads: { type: integer }
                        urgent_action_count: { type: integer }

  # ══════════════════════════════════════════════════════════════
  # AUTOMATION
  # ══════════════════════════════════════════════════════════════

  /automation/rules:
    get:
      tags: [Automation]
      summary: List all automation rules (Manager+ full; Salesperson read-only)
      security:
        - DealerBearer: []
      parameters:
        - name: channel
          in: query
          schema: { $ref: '#/components/schemas/AutomationChannel' }
        - name: is_active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Automation rules list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AutomationRule' }

    post:
      tags: [Automation]
      summary: Create automation rule (Manager+ only)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel, rule_type, name, trigger_event]
              properties:
                channel: { $ref: '#/components/schemas/AutomationChannel' }
                rule_type: { type: string }
                name: { type: string }
                trigger_event: { type: string }
                conditions: { type: object, additionalProperties: true }
                actions: { type: object, additionalProperties: true }
                sequence_steps: { type: array, items: { type: object } }
                is_active: { type: boolean, default: true }
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AutomationRule' }

  /automation/rules/{id}:
    put:
      tags: [Automation]
      summary: Update automation rule (Manager+ only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                conditions: { type: object }
                actions: { type: object }
                sequence_steps: { type: array, items: { type: object } }
                is_active: { type: boolean }
      responses:
        '200':
          description: Rule updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AutomationRule' }

    delete:
      tags: [Automation]
      summary: Delete automation rule (Manager+ only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Rule deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      message: { type: string }

  /automation/rules/{id}/test:
    post:
      tags: [Automation]
      summary: Test an automation rule manually (Manager+ only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                test_contact_phone: { type: string }
                test_lead_id: { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Test executed (dry-run by default, sends if send=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      would_execute: { type: boolean }
                      rendered_message: { type: string }
                      rate_limit_remaining: { type: integer }

  /automation/logs:
    get:
      tags: [Automation]
      summary: Get automation event logs (Manager+ only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: channel
          in: query
          schema: { $ref: '#/components/schemas/AutomationChannel' }
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, sent, delivered, failed, bounced, opted_out, skipped]
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Automation logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AutomationLog' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /automation/whatsapp/templates:
    get:
      tags: [Automation]
      summary: List WhatsApp quick-reply templates (all roles)
      security:
        - DealerBearer: []
      responses:
        '200':
          description: Template list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/WhatsAppTemplate' }

    post:
      tags: [Automation]
      summary: Create or update WhatsApp template (Manager+ only)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, body, category]
              properties:
                name: { type: string, maxLength: 100 }
                body: { type: string }
                category:
                  type: string
                  enum: [quick_reply, sequence, away, greeting, campaign]
                language: { $ref: '#/components/schemas/LanguagePref' }
                sort_order: { type: integer }
      responses:
        '201':
          description: Template saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/WhatsAppTemplate' }

  /automation/social/posts:
    get:
      tags: [Automation]
      summary: Get social post queue (Manager+ full; Salesperson read-only)
      security:
        - DealerBearer: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_approval, scheduled, published, failed, cancelled]
      responses:
        '200':
          description: Post queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        vehicle_id: { type: string, format: uuid, nullable: true }
                        platform: { type: string }
                        caption: { type: string }
                        image_urls: { type: array, items: { type: string } }
                        scheduled_at: { type: string, format: date-time }
                        status: { type: string }
                        platform_post_id: { type: string, nullable: true }
                        published_at: { type: string, format: date-time, nullable: true }

    post:
      tags: [Automation]
      summary: Schedule a social media post (Manager+ only)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, caption, scheduled_at]
              properties:
                vehicle_id: { type: string, format: uuid, nullable: true }
                platform:
                  type: string
                  enum: [facebook, instagram, both]
                caption: { type: string }
                hashtags: { type: string, nullable: true }
                scheduled_at: { type: string, format: date-time }
      responses:
        '201':
          description: Post scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      id: { type: string, format: uuid }
                      status: { type: string }

  /automation/sms/campaign:
    post:
      tags: [Automation]
      summary: Launch SMS campaign (Owner only)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, segment, message]
              properties:
                name: { type: string }
                segment:
                  type: string
                  enum: [all, recent_buyers, active_leads, by_district, by_make, opted_in_only]
                segment_filter:
                  type: object
                  additionalProperties: true
                  nullable: true
                  description: e.g. { "district": "Dhaka" } or { "make": "Toyota" }
                message:
                  type: string
                  maxLength: 135
                  description: "Max 135 chars — system appends 'Reply STOP to unsubscribe.' (25 chars)"
                scheduled_at:
                  type: string
                  format: date-time
                  nullable: true
                  description: "null = send immediately"
      responses:
        '201':
          description: Campaign queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      campaign_id: { type: string, format: uuid }
                      recipient_count: { type: integer }
                      estimated_send_at: { type: string, format: date-time }

  # ══════════════════════════════════════════════════════════════
  # MARKETPLACE (PUBLIC)
  # ══════════════════════════════════════════════════════════════

  /marketplace/search:
    get:
      tags: [Marketplace]
      summary: Search marketplace listings (public)
      parameters:
        - name: q
          in: query
          description: Full-text search
          schema: { type: string }
        - name: make
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: year_min
          in: query
          schema: { type: integer }
        - name: year_max
          in: query
          schema: { type: integer }
        - name: price_min
          in: query
          schema: { type: integer }
        - name: price_max
          in: query
          schema: { type: integer }
        - name: mileage_min
          in: query
          schema: { type: integer }
        - name: mileage_max
          in: query
          schema: { type: integer }
        - name: body_type
          in: query
          schema: { type: string }
        - name: fuel_type
          in: query
          schema: { $ref: '#/components/schemas/FuelType' }
        - name: transmission
          in: query
          schema: { $ref: '#/components/schemas/TransmissionType' }
        - name: condition
          in: query
          schema: { $ref: '#/components/schemas/VehicleCondition' }
        - name: district
          in: query
          schema: { type: string }
        - name: deal_rating
          in: query
          schema: { $ref: '#/components/schemas/DealRating' }
        - name: seller_type
          in: query
          schema: { type: string, enum: [dealer, private] }
        - name: sort
          in: query
          schema:
            type: string
            enum: [best_deal, newest, price_asc, price_desc, mileage_asc, most_viewed]
            default: best_deal
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Search results with facets
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/MarketplaceSearchResult' }

  /marketplace/listings/{slug}:
    get:
      tags: [Marketplace]
      summary: Get vehicle listing detail (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Listing detail with IMV data and dealer info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/MarketplaceListing' }
        '404':
          description: Listing not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /marketplace/dealers/{slug}:
    get:
      tags: [Marketplace]
      summary: Get dealer profile page (public)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Dealer profile with active listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      dealer: { $ref: '#/components/schemas/Dealership' }
                      listings:
                        type: array
                        items: { $ref: '#/components/schemas/MarketplaceListing' }
                      listing_count: { type: integer }

  /marketplace/leads:
    post:
      tags: [Marketplace]
      summary: Submit buyer enquiry (public)
      description: |
        Creates a lead in the dealer's CRM. Triggers:
        - Push notification to assigned salesperson
        - WhatsApp Day 0 auto-reply (if dealer has WABA configured)
        - Buyer confirmation SMS
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SubmitEnquiryDto' }
      responses:
        '201':
          description: Enquiry submitted; lead created in dealer CRM
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      lead_id: { type: string, format: uuid }
                      message: { type: string, example: "Enquiry sent. The dealer will contact you shortly." }

  /marketplace/c2c/listings:
    post:
      tags: [Marketplace]
      summary: Create C2C listing (authenticated buyer/seller)
      description: Listing enters moderation queue. Payment required before submission.
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [make, model, year, mileage_km, fuel_type, transmission, condition, asking_price, district, photos]
              properties:
                make: { type: string }
                model: { type: string }
                year: { type: integer }
                variant: { type: string }
                mileage_km: { type: integer }
                fuel_type: { $ref: '#/components/schemas/FuelType' }
                transmission: { $ref: '#/components/schemas/TransmissionType' }
                condition: { $ref: '#/components/schemas/VehicleCondition' }
                asking_price: { $ref: '#/components/schemas/BdtAmount' }
                district: { type: string }
                description: { type: string, maxLength: 500 }
                photos:
                  type: array
                  items: { type: string, format: uri }
                  minItems: 4
                  maxItems: 20
                  description: R2 URLs of already-uploaded photos
                condition_assessment:
                  type: object
                  properties:
                    engine: { type: string, enum: [ok, needs_work, critical] }
                    body: { type: string, enum: [ok, needs_work, critical] }
                    paint: { type: string, enum: [ok, needs_work, critical] }
                    interior: { type: string, enum: [ok, needs_work, critical] }
                    electricals: { type: string, enum: [ok, needs_work, critical] }
                    tyres: { type: string, enum: [ok, needs_work, critical] }
                    ac: { type: string, enum: [ok, needs_work, critical] }
                    brakes: { type: string, enum: [ok, needs_work, critical] }
                features:
                  type: array
                  items: { type: string }
                contact_preference:
                  type: string
                  enum: [show_phone, whatsapp_only, form_only]
                payment_transaction_id:
                  type: string
                  format: uuid
                  description: Verified payment for listing fee (BDT 199)
      responses:
        '201':
          description: Listing submitted for moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      listing_id: { type: string, format: uuid }
                      status: { type: string, enum: [pending_moderation] }
                      estimated_review_by: { type: string, format: date-time }

  /marketplace/saved-vehicles:
    post:
      tags: [Marketplace]
      summary: Save a vehicle to wishlist (authenticated buyer)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listing_id]
              properties:
                listing_id: { type: string, format: uuid }
      responses:
        '201':
          description: Vehicle saved; price drop alert subscription created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      saved_id: { type: string, format: uuid }

  /marketplace/saved-searches:
    post:
      tags: [Marketplace]
      summary: Save a search with alert preferences (authenticated buyer)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [filters]
              properties:
                name: { type: string, nullable: true }
                filters:
                  type: object
                  additionalProperties: true
                  description: Same filter keys as /marketplace/search
                alert_enabled: { type: boolean, default: true }
                alert_channel:
                  $ref: '#/components/schemas/AutomationChannel'
      responses:
        '201':
          description: Search saved with alert
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      saved_search_id: { type: string, format: uuid }

  # ══════════════════════════════════════════════════════════════
  # IMV
  # ══════════════════════════════════════════════════════════════

  /imv:
    get:
      tags: [IMV]
      summary: Get IMV estimate for a specific cluster (public)
      parameters:
        - name: make
          in: query
          required: true
          schema: { type: string }
        - name: model
          in: query
          required: true
          schema: { type: string }
        - name: year
          in: query
          required: true
          schema: { type: integer }
        - name: mileage_bucket
          in: query
          required: true
          schema:
            type: string
            enum: ['0-30K', '30-60K', '60-100K', '100K+']
        - name: condition
          in: query
          required: true
          schema: { $ref: '#/components/schemas/VehicleCondition' }
        - name: district
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: IMV cluster data (cached; TTL 3,600s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/ImvCluster' }

  /imv/trends:
    get:
      tags: [IMV]
      summary: Get price trend data for a make/model (public)
      parameters:
        - name: make
          in: query
          required: true
          schema: { type: string }
        - name: model
          in: query
          required: true
          schema: { type: string }
        - name: district
          in: query
          schema: { type: string, description: "Defaults to national if omitted" }
        - name: months
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 24
            default: 6
      responses:
        '200':
          description: Price trend data points
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        date: { type: string, format: date }
                        avg_price: { $ref: '#/components/schemas/BdtAmount' }
                        median_price: { $ref: '#/components/schemas/BdtAmount' }
                        listing_count: { type: integer }

  # ══════════════════════════════════════════════════════════════
  # WEBSITE BUILDER
  # ══════════════════════════════════════════════════════════════

  /website:
    get:
      tags: [Website]
      summary: Get dealer website configuration (Manager+ only)
      security:
        - DealerBearer: []
      responses:
        '200':
          description: Website configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/DealerWebsite' }

    put:
      tags: [Website]
      summary: Update website settings (Manager+ only)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                meta_title: { type: string, maxLength: 255 }
                meta_description: { type: string, maxLength: 160 }
                google_analytics_id: { type: string, nullable: true }
                facebook_pixel_id: { type: string, nullable: true }
      responses:
        '200':
          description: Website settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/DealerWebsite' }

  /website/setup:
    post:
      tags: [Website]
      summary: Run website setup wizard (Owner only)
      description: Provisions subdomain, generates microsite, injects pixels, submits sitemap to GSC.
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tagline]
              properties:
                tagline: { type: string, maxLength: 255 }
                primary_color:
                  type: string
                  pattern: '^#[0-9A-Fa-f]{6}$'
      responses:
        '201':
          description: Website live
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      subdomain: { type: string }
                      website_url: { type: string, format: uri }
                      listings_imported: { type: integer }

  /website/custom-domain:
    post:
      tags: [Website]
      summary: Initiate custom domain connection (Owner only; Business+ plan)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [domain]
              properties:
                domain:
                  type: string
                  example: "cars.mydealer.com.bd"
      responses:
        '200':
          description: Domain instructions returned; verification started
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      cname_name: { type: string, example: "cars" }
                      cname_value: { type: string, example: "dealer.autoverse.com.bd" }
                      cname_ttl: { type: integer, example: 3600 }
                      verification_poll_seconds: { type: integer, example: 120 }
                      verification_expires_in_minutes: { type: integer, example: 20 }

  /website/custom-domain/verify:
    post:
      tags: [Website]
      summary: Manually trigger domain verification check (Owner only)
      security:
        - DealerBearer: []
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean }
                      message: { type: string }
                      custom_domain: { type: string, nullable: true }

  # ══════════════════════════════════════════════════════════════
  # PAYMENTS
  # ══════════════════════════════════════════════════════════════

  /payments/bkash/create:
    post:
      tags: [Payments]
      summary: Initiate bKash payment
      description: |
        Creates payment on bKash Tokenized Checkout API.
        Returns bKash redirect URL. Idempotency key auto-generated
        (SHA256 of dealerId:invoiceId:5-minute-bucket).
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id: { type: string, format: uuid }
      responses:
        '201':
          description: Payment initiated; redirect buyer to bkash_url
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      payment_id: { type: string }
                      bkash_url: { type: string, format: uri }
                      amount: { $ref: '#/components/schemas/BdtAmount' }
        '503':
          description: bKash gateway unavailable (circuit breaker open)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /payments/bkash/execute:
    post:
      tags: [Payments]
      summary: Execute bKash payment (called after buyer returns from bKash URL)
      description: |
        IMPORTANT: Never mark payment as failed based on redirect status alone.
        This endpoint always queries bKash API to confirm actual payment status
        before updating invoice. Timeout recovery: 4 query attempts.
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_id]
              properties:
                payment_id: { type: string }
      responses:
        '200':
          description: Payment executed; subscription activated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      status: { type: string, enum: [success, failed, pending] }
                      transaction_id: { type: string, nullable: true }
                      subscription_active: { type: boolean }

  /payments/nagad/init:
    post:
      tags: [Payments]
      summary: Initialize Nagad payment
      description: RSA-encrypted and RSA-signed request to Nagad API.
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id: { type: string, format: uuid }
      responses:
        '201':
          description: Nagad payment initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      payment_reference_id: { type: string }
                      redirect_url: { type: string, format: uri }

  /payments/nagad/complete:
    post:
      tags: [Payments]
      summary: Complete Nagad payment (called after buyer returns)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_reference_id]
              properties:
                payment_reference_id: { type: string }
      responses:
        '200':
          description: Payment completion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      status: { type: string, enum: [success, failed, pending] }
                      transaction_id: { type: string, nullable: true }

  /payments/sslcommerz/init:
    post:
      tags: [Payments]
      summary: Initiate SSLCommerz payment (card + alternate methods)
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invoice_id]
              properties:
                invoice_id: { type: string, format: uuid }
      responses:
        '201':
          description: SSLCommerz session created; redirect to gateway URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      gateway_url: { type: string, format: uri }
                      session_key: { type: string }

  /payments/sslcommerz/ipn:
    post:
      tags: [Payments]
      summary: SSLCommerz IPN callback (webhook — no auth)
      description: |
        Validates MD5 hash before processing. Verifies amount matches invoice.
        ALWAYS returns HTTP 200 to SSLCommerz (even if rejected internally).
        Activation only occurs after hash validation AND amount verification.
      responses:
        '200':
          description: IPN received (always 200 to prevent SSLCommerz retries)

  /payments/bkash/ipn:
    post:
      tags: [Payments]
      summary: bKash IPN callback (webhook — no auth)
      description: |
        Secondary confirmation mechanism. Always queries bKash API to verify
        before acting. Idempotency check prevents double-activation.
      responses:
        '200':
          description: IPN processed

  /subscriptions/plans:
    get:
      tags: [Payments]
      summary: Get available subscription plans (public)
      responses:
        '200':
          description: All plan configurations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        tier: { $ref: '#/components/schemas/SubscriptionTier' }
                        display_name: { type: string }
                        monthly_price_bdt: { $ref: '#/components/schemas/BdtAmount' }
                        listing_limit: { type: integer }
                        staff_seat_limit: { type: integer }
                        features: { type: object, additionalProperties: true }

  /subscriptions/me:
    get:
      tags: [Payments]
      summary: Get current subscription (Owner only)
      security:
        - DealerBearer: []
      responses:
        '200':
          description: Current subscription details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/Subscription' }

    put:
      tags: [Payments]
      summary: Change subscription plan (Owner only)
      description: |
        Upgrade: prorated charge applied immediately.
        Downgrade: scheduled for next billing date.
        Downgrade blocked if current usage exceeds new plan limits.
      security:
        - DealerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { $ref: '#/components/schemas/SubscriptionTier' }
      responses:
        '200':
          description: Plan change processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      action: { type: string, enum: [upgraded_immediately, downgrade_scheduled] }
                      effective_date: { type: string, format: date }
                      proration_charge: { $ref: '#/components/schemas/BdtAmount', nullable: true }

  /payments/invoices:
    get:
      tags: [Payments]
      summary: Get invoice history (Owner only)
      security:
        - DealerBearer: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Invoice history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Invoice' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  # ══════════════════════════════════════════════════════════════
  # FEEDS (GMC + FACEBOOK CATALOG)
  # ══════════════════════════════════════════════════════════════

  /feeds/gmc/{dealershipId}:
    get:
      tags: [Feeds]
      summary: Google Merchant Center feed (RSS 2.0 XML)
      description: |
        Secured via `key` query parameter (feed key stored in dealer_website).
        Called by Google on a 6-hour schedule plus on-demand via BullMQ.
      parameters:
        - name: dealershipId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: key
          in: query
          required: true
          schema: { type: string }
          description: Feed key from dealer_website.gmc_feed_key
      responses:
        '200':
          description: RSS 2.0 XML feed with all active vehicle listings
          content:
            application/rss+xml:
              schema:
                type: string
        '401':
          description: Invalid feed key

  # ══════════════════════════════════════════════════════════════
  # ADMIN (IP-RESTRICTED + ADMIN JWT)
  # ══════════════════════════════════════════════════════════════

  /admin/dealers:
    get:
      tags: [Admin]
      summary: List all dealers with filters (Operations Manager+)
      security:
        - AdminBearer: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_approval, active, suspended, terminated]
        - name: plan_tier
          in: query
          schema: { $ref: '#/components/schemas/SubscriptionTier' }
        - name: district
          in: query
          schema: { type: string }
        - name: q
          in: query
          description: Search by name, phone, or slug
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [joined_at, mrr_bdt, listing_count, last_active_at]
            default: joined_at
        - $ref: '#/components/parameters/OrderParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated dealer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AdminDealerSummary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /admin/dealers/{id}:
    get:
      tags: [Admin]
      summary: Get full dealer profile (Operations Manager+)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Full dealer record with subscription, usage, flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    allOf:
                      - $ref: '#/components/schemas/Dealership'
                      - type: object
                        properties:
                          subscription: { $ref: '#/components/schemas/Subscription' }
                          usage:
                            type: object
                            properties:
                              active_listings: { type: integer }
                              staff_count: { type: integer }
                              leads_30d: { type: integer }
                              deals_30d: { type: integer }
                              mrr_bdt: { $ref: '#/components/schemas/BdtAmount' }
                          flags:
                            type: array
                            items:
                              type: object
                              properties:
                                type: { type: string }
                                added_by: { type: string }
                                added_at: { type: string, format: date-time }
                          admin_notes:
                            type: array
                            items:
                              type: object
                              properties:
                                note: { type: string }
                                author: { type: string }
                                created_at: { type: string, format: date-time }

  /admin/dealers/{id}/approve:
    post:
      tags: [Admin]
      summary: Approve pending dealer (Operations Manager)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApproveDealerDto' }
      responses:
        '200':
          description: Dealer approved; welcome SMS sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      dealer_id: { type: string, format: uuid }
                      status: { type: string, enum: [active] }

  /admin/dealers/{id}/suspend:
    post:
      tags: [Admin]
      summary: Suspend dealer (Operations Manager)
      description: DMS → read-only. Listings hidden. New leads blocked. Effects within 60 seconds.
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SuspendDealerDto' }
      responses:
        '200':
          description: Dealer suspended; effects applied within 60 seconds
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      dealer_id: { type: string, format: uuid }
                      status: { type: string, enum: [suspended] }
                      listings_hidden: { type: integer }

  /admin/dealers/{id}/reinstate:
    post:
      tags: [Admin]
      summary: Reinstate suspended dealer (Operations Manager)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Dealer reinstated; all listings restored within 60 seconds
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      dealer_id: { type: string, format: uuid }
                      status: { type: string, enum: [active] }
                      listings_restored: { type: integer }

  /admin/dealers/{id}/terminate:
    post:
      tags: [Admin]
      summary: Terminate dealer permanently (Super Admin only + fresh TOTP)
      description: |
        IRREVERSIBLE. Requires:
        - Super Admin role JWT
        - Fresh TOTP code in request body (not cached; max 1 use per 90 seconds)
        Effects: all listings deleted, website returns 404, CNAME deregistered,
        dealer data retained 7 years.
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason, totp_code]
              properties:
                reason: { type: string }
                totp_code:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: Dealer terminated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      dealer_id: { type: string, format: uuid }
                      status: { type: string, enum: [terminated] }
        '403':
          description: Requires Super Admin role or fresh TOTP
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }

  /admin/dealers/{id}/impersonate:
    post:
      tags: [Admin]
      summary: Impersonate dealer (Super Admin only)
      description: |
        Issues a short-lived RS256 token with is_impersonation=true.
        All actions taken with this token are watermarked in audit logs.
        Token TTL: 3,600 seconds. Every impersonation action logged in platform_audit_log.
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      responses:
        '200':
          description: Impersonation token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      impersonation_token: { type: string }
                      expires_in: { type: integer, example: 3600 }
                      dealer_name: { type: string }

  /admin/dealers/{id}/note:
    post:
      tags: [Admin]
      summary: Add internal admin note to dealer (all admin roles)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [note]
              properties:
                note: { type: string }
      responses:
        '201':
          description: Note added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      note_id: { type: string, format: uuid }

  /admin/moderation/listings:
    get:
      tags: [Admin]
      summary: Get C2C moderation queue (Content Moderator+)
      security:
        - AdminBearer: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_moderation, under_review, flagged]
            default: pending_moderation
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Moderation queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/MarketplaceListing'
                        - type: object
                          properties:
                            auto_check_results:
                              type: object
                              properties:
                                photos_ok: { type: boolean }
                                price_ok: { type: boolean }
                                specs_ok: { type: boolean }
                                contact_ok: { type: boolean }
                                no_duplicate: { type: boolean }
                            seller_history:
                              type: object
                              properties:
                                total_listings: { type: integer }
                                rejection_count: { type: integer }
                                active_flags: { type: integer }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }

  /admin/moderation/listings/{id}:
    put:
      tags: [Admin]
      summary: Make moderation decision on C2C listing (Content Moderator+)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PathId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerationDecisionDto' }
      responses:
        '200':
          description: Moderation decision applied; seller notified via SMS
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      listing_id: { type: string, format: uuid }
                      outcome: { type: string }
                      resubmits_remaining: { type: integer, nullable: true }

  /admin/payments/dashboard:
    get:
      tags: [Admin]
      summary: Revenue dashboard (Finance Admin+)
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Platform revenue metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      mrr_bdt: { $ref: '#/components/schemas/BdtAmount' }
                      arr_bdt: { $ref: '#/components/schemas/BdtAmount' }
                      active_paying_dealers: { type: integer }
                      new_mrr_this_month: { $ref: '#/components/schemas/BdtAmount' }
                      churned_mrr_this_month: { $ref: '#/components/schemas/BdtAmount' }
                      net_mrr_movement: { $ref: '#/components/schemas/BdtAmount' }
                      plan_distribution:
                        type: object
                        additionalProperties: { type: integer }

  /admin/payments/failed:
    get:
      tags: [Admin]
      summary: Get failed payment queue (Finance Admin+)
      security:
        - AdminBearer: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Failed invoices awaiting recovery action
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Invoice'
                        - type: object
                          properties:
                            dealer_name: { type: string }
                            dealer_phone: { type: string }
                            failure_reason: { type: string }
                            attempt_count: { type: integer }
                            days_overdue: { type: integer }

  /admin/broadcast:
    post:
      tags: [Admin]
      summary: Send broadcast message to dealers (Operations Manager+)
      security:
        - AdminBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BroadcastMessageDto' }
      responses:
        '201':
          description: Broadcast queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      broadcast_id: { type: string, format: uuid }
                      recipient_count: { type: integer }
                      estimated_delivery: { type: string, format: date-time }

  /admin/system/health:
    get:
      tags: [Admin]
      summary: System health dashboard (System Admin+)
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Real-time system metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      api:
                        type: object
                        properties:
                          requests_per_minute: { type: number }
                          p50_response_ms: { type: number }
                          p95_response_ms: { type: number }
                          error_rate_pct: { type: number }
                      queues:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            waiting: { type: integer }
                            active: { type: integer }
                            failed: { type: integer }
                            dlq: { type: integer }
                      sync:
                        type: object
                        properties:
                          avg_sync_time_ms: { type: number }
                          p95_sync_time_ms: { type: number }
                          within_sla_pct: { type: number }
                          failed_last_24h: { type: integer }
                      redis:
                        type: object
                        properties:
                          memory_used_mb: { type: number }
                          hit_rate_pct: { type: number }
                      database:
                        type: object
                        properties:
                          connection_pool_used: { type: integer }
                          connection_pool_max: { type: integer }
                          slow_queries_last_hour: { type: integer }

  /admin/feature-flags:
    get:
      tags: [Admin]
      summary: List all feature flags (System Admin+)
      security:
        - AdminBearer: []
      responses:
        '200':
          description: All feature flags
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        description: { type: string }
                        enabled_global: { type: boolean }
                        enabled_for_plans:
                          type: array
                          items: { type: string }
                          nullable: true
                        enabled_for_dealers:
                          type: array
                          items: { type: string, format: uuid }
                          nullable: true
                        rollout_pct: { type: integer, nullable: true }
                        updated_at: { type: string, format: date-time }

  /admin/feature-flags/{key}:
    put:
      tags: [Admin]
      summary: Toggle feature flag (System Admin+ for global; Operations Manager for dealer-level)
      description: Changes take effect immediately without redeployment.
      security:
        - AdminBearer: []
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled_global: { type: boolean }
                enabled_for_plans:
                  type: array
                  items: { type: string }
                  nullable: true
                enabled_for_dealers:
                  type: array
                  items: { type: string, format: uuid }
                  nullable: true
                rollout_pct:
                  type: integer
                  minimum: 0
                  maximum: 100
                  nullable: true
      responses:
        '200':
          description: Feature flag updated; effective immediately
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      key: { type: string }
                      enabled_global: { type: boolean }
                      affected_dealers_estimate: { type: integer }

  /admin/analytics/overview:
    get:
      tags: [Admin]
      summary: Platform KPIs for investor/executive view (Super Admin only)
      security:
        - AdminBearer: []
      responses:
        '200':
          description: Platform KPIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data:
                    type: object
                    properties:
                      total_dealers: { type: integer }
                      active_paying_dealers: { type: integer }
                      free_dealers: { type: integer }
                      total_marketplace_listings: { type: integer }
                      total_leads_all_time: { type: integer }
                      total_deals_all_time: { type: integer }
                      mrr_bdt: { $ref: '#/components/schemas/BdtAmount' }
                      arr_bdt: { $ref: '#/components/schemas/BdtAmount' }
                      monthly_churn_rate_pct: { type: number }
                      avg_activation_days: { type: number }
                      marketplace_page_views_30d: { type: integer }
                      enquiries_30d: { type: integer }

  # ══════════════════════════════════════════════════════════════
  # HEALTH
  # ══════════════════════════════════════════════════════════════

  /health:
    get:
      tags: [Health]
      summary: API liveness check
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  timestamp: { type: string, format: date-time }
                  version: { type: string }

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness check (database + Redis connected)
      responses:
        '200':
          description: All dependencies healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }
                  database: { type: string, enum: [ok, degraded] }
                  redis: { type: string, enum: [ok, degraded] }
                  meilisearch: { type: string, enum: [ok, degraded] }
        '503':
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [degraded] }
                  database: { type: string }
                  redis: { type: string }
                  meilisearch: { type: string }
