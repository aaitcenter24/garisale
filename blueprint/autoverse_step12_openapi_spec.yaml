          in: query
          schema:
            type: string
            format: date
            description: Required when period=custom
        - name: to
          in: query
          schema:
            type: string
            format: date
            description: Required when period=custom
      responses:
        '200':
          description: Performance metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/PerformanceMetrics' }

  /analytics/staff:
    get:
      tags: [Analytics]
      summary: Staff performance table (Owner sees all; Salesperson sees own row only)
      security:
        - DealerBearer: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [this_month, last_month, last_90_days]
