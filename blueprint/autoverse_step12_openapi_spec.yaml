openapi: 3.0.3

info:
  title: AutoVerse API
  description: |
    Complete REST API for the AutoVerse Automotive Ecosystem OS.
    
    ## Authentication
    Most endpoints require a Bearer JWT token in the `Authorization` header.
    Dealer and Admin tokens use separate RS256 / HS256 signing keys.
    
    ## Tenancy
    All dealer-scoped endpoints automatically filter by the `dealer_id` claim
    in the JWT. Passing a `dealership_id` in the request body is ignored —
    the JWT claim is always authoritative.
    
    ## Response Envelope
    All responses are wrapped:
    ```json
    { "success": true, "data": <T>, "meta": { "total": 0, "page": 1, "limit": 20 } }
    { "success": false, "error": { "code": "ERROR_CODE", "message": "..." }, "request_id": "uuid" }
    ```
    
    ## Versioning
    All routes are prefixed with `/api/v1/`.
  version: "1.0.0"
  contact:
    name: AutoVerse Engineering
    email: engineering@autoverse.com.bd
  license:
    name: Proprietary

servers:
  - url: https://api.autoverse.com.bd/api/v1
    description: Production
  - url: https://staging.api.autoverse.com.bd/api/v1
    description: Staging

# ─────────────────────────────────────────────────────────────────
# SECURITY SCHEMES
# ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    DealerBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256 dealer JWT. Claims include dealer_id, dealer_role, plan_tier.
    AdminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 admin JWT. Claims include admin_role, session_id.

  # ─────────────────────────────────────────────────────────────────
  # SHARED PARAMETERS
  # ─────────────────────────────────────────────────────────────────
  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    SortParam:
      name: sort
      in: query
      schema:
        type: string
    OrderParam:
      name: order
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: desc

  # ─────────────────────────────────────────────────────────────────
  # SHARED SCHEMAS
  # ─────────────────────────────────────────────────────────────────
  schemas:

    # ── ENUMS ──────────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [admin_user, dealer_owner, manager, salesperson, technician, buyer, c2c_seller]

    VehicleStatus:
      type: string
      enum: [acquired, in_recon, available, reserved, sold, scrapped]

    VehicleCondition:
      type: string
      enum: [new, used, reconditioned]

    FuelType:
      type: string
      enum: [petrol, diesel, hybrid, electric, cng, lpg]

    TransmissionType:
      type: string
      enum: [automatic, manual, cvt, dct, amt]

    LeadStage:
      type: string
      enum: [new, contacted, qualified, test_drive, quote_sent, negotiation, closed, lost]

    LeadSource:
      type: string
      enum: [walk_in, marketplace, dealer_website, facebook_lead_ad, whatsapp, phone, referral, sms_campaign, email_campaign, social_media, other]

    LeadPriority:
      type: string
      enum: [hot, warm, cold]

    DealStatus:
      type: string
      enum: [draft, pending_approval, approved, delivered, cancelled]

    DealType:
      type: string
      enum: [cash, finance, lease, exchange, exchange_plus_cash]

    DealRating:
      type: string
      enum: [great_deal, good_deal, fair_price, overpriced, unrated]

    ListingStatus:
      type: string
      enum: [active, reserved, sold, hidden, archived, expired, under_review, rejected]

    PaymentMethod:
      type: string
      enum: [bkash, nagad, rocket, bank_transfer, cash, sslcommerz, card, cheque]

    SubscriptionTier:
      type: string
      enum: [free, starter, professional, business, enterprise]

    AutomationChannel:
      type: string
      enum: [whatsapp, facebook, instagram, email, sms, push]

    LanguagePref:
      type: string
      enum: [en, bn]

    # ── PAGINATION META ──────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean

    # ── MONEY ────────────────────────────────────────────────────────
    BdtAmount:
      type: number
      format: decimal
      description: Amount in Bangladesh Taka (BDT). Two decimal places.
      example: 1450000.00

    # ── ERROR ────────────────────────────────────────────────────────
    ApiError:
      type: object
      required: [success, error, request_id]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: VEHICLE_NOT_FOUND
            message:
              type: string
              example: Vehicle not found
            field:
              type: string
              description: Present only for validation errors
        request_id:
          type: string
          format: uuid

    # ── VEHICLE PHOTO ─────────────────────────────────────────────────
    VehiclePhoto:
      type: object
      properties:
        url:
          type: string
          format: uri
        thumb_url:
          type: string
          format: uri
        sort_order:
          type: integer
        is_primary:
          type: boolean
        captured_at:
          type: string
          format: date-time

    # ── USER ─────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+8801711234567"
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        preferred_language:
          $ref: '#/components/schemas/LanguagePref'
        avatar_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    # ── DEALERSHIP ───────────────────────────────────────────────────
    Dealership:
      type: object
      properties:
        id:
          type: string
          format: uuid
        business_name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [pending_approval, active, suspended, terminated]
        subscription_tier:
          $ref: '#/components/schemas/SubscriptionTier'
        subscription_expires_at:
          type: string
          format: date-time
        listing_limit:
          type: integer
        district:
          type: string
        division:
          type: string
        phone:
          type: string
        whatsapp_number:
          type: string
        logo_url:
          type: string
          format: uri
        primary_color:
          type: string
          example: "#2563EB"
        rating:
          type: number
          format: float
          minimum: 0
          maximum: 5
        review_count:
          type: integer
        total_listings:
          type: integer
        created_at:
          type: string
          format: date-time

    # ── VEHICLE ──────────────────────────────────────────────────────
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dealership_id:
          type: string
          format: uuid
        stock_no:
          type: string
          example: SK-202501-0034
        vin:
          type: string
          maxLength: 17
        make:
          type: string
          example: Toyota
        model:
          type: string
          example: Axio
        year:
          type: integer
          example: 2019
        variant:
          type: string
          example: G Grade
        body_type:
          type: string
        engine_cc:
          type: integer
        fuel_type:
          $ref: '#/components/schemas/FuelType'
        transmission:
          $ref: '#/components/schemas/TransmissionType'
        condition:
          $ref: '#/components/schemas/VehicleCondition'
        mileage_km:
          type: integer
        mileage_bucket:
          type: string
          enum: ['0-30K', '30-60K', '60-100K', '100K+']
        color:
          type: string
        asking_price:
          $ref: '#/components/schemas/BdtAmount'
        # Financial fields — null for roles without access
        acquisition_cost:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
          description: "null for Manager and Salesperson roles"
        recon_total:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
          description: "null for Salesperson role"
        net_profit_estimate:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
          description: "null for Manager and Salesperson roles"
        status:
          $ref: '#/components/schemas/VehicleStatus'
        days_on_lot:
          type: integer
          nullable: true
          description: Computed column. Present only when status is available.
        available_at:
          type: string
          format: date-time
          nullable: true
        sold_at:
          type: string
          format: date-time
          nullable: true
        photos:
          type: array
          items:
            $ref: '#/components/schemas/VehiclePhoto'
        photo_count:
          type: integer
        marketplace_published:
          type: boolean
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        sync_error:
          type: string
          nullable: true
        features:
          type: array
          items:
            type: string
        specs:
          type: object
          additionalProperties: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateVehicleDto:
      type: object
      required: [make, model, year, mileage_km, fuel_type, transmission, condition, asking_price]
      properties:
        vin:
          type: string
          minLength: 17
          maxLength: 17
          nullable: true
        make:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        year:
          type: integer
          minimum: 1970
          maximum: 2027
        variant:
          type: string
          maxLength: 200
        body_type:
          type: string
          maxLength: 50
        engine_cc:
          type: integer
          minimum: 0
        fuel_type:
          $ref: '#/components/schemas/FuelType'
        transmission:
          $ref: '#/components/schemas/TransmissionType'
        condition:
          $ref: '#/components/schemas/VehicleCondition'
        mileage_km:
          type: integer
          minimum: 0
          maximum: 2000000
        color:
          type: string
        asking_price:
          $ref: '#/components/schemas/BdtAmount'
        acquisition_cost:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        acquisition_source:
          type: string
          enum: [auction, trade_in, direct_purchase, consignment, import]
        acquisition_date:
          type: string
          format: date
        acquired_from:
          type: string
        description:
          type: string
          maxLength: 2000
        features:
          type: array
          items:
            type: string
        specs:
          type: object
          additionalProperties: true
        marketplace_published:
          type: boolean
          default: true

    UpdateVehicleStatusDto:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/VehicleStatus'
        reason:
          type: string

    # ── RECON ─────────────────────────────────────────────────────────
    ReconAssessment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        engine_status:
          type: string
          enum: [ok, needs_work, critical]
        body_status:
          type: string
          enum: [ok, needs_work, critical]
        paint_status:
          type: string
          enum: [ok, needs_work, critical]
        interior_status:
          type: string
          enum: [ok, needs_work, critical]
        electricals_status:
          type: string
          enum: [ok, needs_work, critical]
        tyres_status:
          type: string
          enum: [ok, needs_work, critical]
        ac_status:
          type: string
          enum: [ok, needs_work, critical]
        brakes_status:
          type: string
          enum: [ok, needs_work, critical]
        engine_notes:
          type: string
          nullable: true
        body_notes:
          type: string
          nullable: true
        paint_notes:
          type: string
          nullable: true
        interior_notes:
          type: string
          nullable: true
        electricals_notes:
          type: string
          nullable: true
        tyres_notes:
          type: string
          nullable: true
        ac_notes:
          type: string
          nullable: true
        brakes_notes:
          type: string
          nullable: true
        overall_notes:
          type: string
          nullable: true
        assessed_by:
          type: string
          format: uuid
        assessed_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/ReconTask'

    ReconTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        category:
          type: string
          enum: [engine, body, paint, interior, electricals, tyres, ac, brakes, other]
        description:
          type: string
        assigned_to_user:
          type: string
          format: uuid
          nullable: true
        assigned_to_name:
          type: string
          nullable: true
        estimated_cost:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        actual_cost:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        status:
          type: string
          enum: [pending, in_progress, complete, cancelled]
        priority:
          type: integer
          minimum: 1
          maximum: 3
          description: "1=critical, 2=normal, 3=minor"
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        receipt_url:
          type: string
          format: uri
          nullable: true

    CreateReconTaskDto:
      type: object
      required: [category, description]
      properties:
        category:
          type: string
          enum: [engine, body, paint, interior, electricals, tyres, ac, brakes, other]
        description:
          type: string
        assigned_to_user:
          type: string
          format: uuid
          nullable: true
        assigned_to_name:
          type: string
          nullable: true
        estimated_cost:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        priority:
          type: integer
          minimum: 1
          maximum: 3
          default: 2

    CompleteReconTaskDto:
      type: object
      required: [actual_cost]
      properties:
        actual_cost:
          $ref: '#/components/schemas/BdtAmount'
        notes:
          type: string

    # ── LEAD ──────────────────────────────────────────────────────────
    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dealership_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
          nullable: true
        assigned_to:
          type: string
          format: uuid
          nullable: true
        assigned_to_name:
          type: string
          nullable: true
        vehicle_id:
          type: string
          format: uuid
          nullable: true
        vehicle_summary:
          type: object
          nullable: true
          properties:
            make: { type: string }
            model: { type: string }
            year: { type: integer }
            asking_price: { $ref: '#/components/schemas/BdtAmount' }
            primary_photo_url: { type: string, format: uri }
        buyer_name:
          type: string
        buyer_phone:
          type: string
        buyer_email:
          type: string
          format: email
          nullable: true
        buyer_district:
          type: string
          nullable: true
        source:
          $ref: '#/components/schemas/LeadSource'
        stage:
          $ref: '#/components/schemas/LeadStage'
        priority:
          $ref: '#/components/schemas/LeadPriority'
        lead_score:
          type: integer
          minimum: 0
          maximum: 200
        lost_reason:
          type: string
          nullable: true
        budget_min:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        budget_max:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        next_follow_up:
          type: string
          format: date-time
          nullable: true
        follow_up_method:
          $ref: '#/components/schemas/AutomationChannel'
          nullable: true
        test_drive_scheduled_at:
          type: string
          format: date-time
          nullable: true
        enquiry_count:
          type: integer
          default: 1
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateLeadDto:
      type: object
      required: [buyer_name, buyer_phone]
      properties:
        buyer_name:
          type: string
          maxLength: 255
        buyer_phone:
          type: string
          maxLength: 20
        buyer_email:
          type: string
          format: email
          nullable: true
        buyer_district:
          type: string
          nullable: true
        source:
          $ref: '#/components/schemas/LeadSource'
          default: walk_in
        vehicle_id:
          type: string
          format: uuid
          nullable: true
        budget_min:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        budget_max:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        notes:
          type: string
          nullable: true
        assigned_to:
          type: string
          format: uuid
          nullable: true

    UpdateLeadStageDto:
      type: object
      required: [stage]
      properties:
        stage:
          $ref: '#/components/schemas/LeadStage'
        lost_reason:
          type: string
          description: Required when stage is 'lost'
          nullable: true

    LogInteractionDto:
      type: object
      required: [type, summary]
      properties:
        type:
          type: string
          enum: [call_outbound, call_inbound, whatsapp_sent, whatsapp_received, email_sent, sms_sent, walk_in, test_drive, note, stage_change]
        direction:
          type: string
          enum: [inbound, outbound]
          nullable: true
        summary:
          type: string
          maxLength: 500
        body:
          type: string
          nullable: true
        duration_sec:
          type: integer
          nullable: true
          description: For call interactions

    ScheduleFollowUpDto:
      type: object
      required: [next_follow_up]
      properties:
        next_follow_up:
          type: string
          format: date-time
        follow_up_method:
          $ref: '#/components/schemas/AutomationChannel'

    LeadInteraction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        direction:
          type: string
          nullable: true
        channel:
          $ref: '#/components/schemas/AutomationChannel'
          nullable: true
        summary:
          type: string
        body:
          type: string
          nullable: true
        duration_sec:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── CUSTOMER ─────────────────────────────────────────────────────
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
          nullable: true
        district:
          type: string
          nullable: true
        preferred_makes:
          type: array
          items:
            type: string
        preferred_body_types:
          type: array
          items:
            type: string
        budget_min:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        budget_max:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        opted_in_sms:
          type: boolean
        opted_in_whatsapp:
          type: boolean
        opted_in_email:
          type: boolean
        opted_in_inventory_alerts:
          type: boolean
        total_purchases:
          type: integer
        total_spend:
          $ref: '#/components/schemas/BdtAmount'
        last_interaction_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── DEAL ──────────────────────────────────────────────────────────
    Deal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        lead_id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        salesperson_id:
          type: string
          format: uuid
        manager_approval_id:
          type: string
          format: uuid
          nullable: true
        deal_type:
          $ref: '#/components/schemas/DealType'
        sale_price:
          $ref: '#/components/schemas/BdtAmount'
        list_price:
          $ref: '#/components/schemas/BdtAmount'
        discount_amount:
          $ref: '#/components/schemas/BdtAmount'
        trade_in_value:
          $ref: '#/components/schemas/BdtAmount'
        gross_profit:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
          description: "null for non-Owner roles"
        deposit_paid:
          $ref: '#/components/schemas/BdtAmount'
        balance_due:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        status:
          $ref: '#/components/schemas/DealStatus'
        lender_name:
          type: string
          nullable: true
        loan_amount:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        interest_rate_pct:
          type: number
          nullable: true
        loan_term_months:
          type: integer
          nullable: true
        monthly_instalment:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        bill_of_sale_url:
          type: string
          format: uri
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        delivered_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateDealDto:
      type: object
      required: [lead_id, vehicle_id, sale_price, deal_type]
      properties:
        lead_id:
          type: string
          format: uuid
        vehicle_id:
          type: string
          format: uuid
        sale_price:
          $ref: '#/components/schemas/BdtAmount'
        deal_type:
          $ref: '#/components/schemas/DealType'
        trade_in_vehicle_id:
          type: string
          format: uuid
          nullable: true
        trade_in_value:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        lender_name:
          type: string
          nullable: true
        loan_amount:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        down_payment:
          $ref: '#/components/schemas/BdtAmount'
          nullable: true
        interest_rate_pct:
          type: number
          nullable: true
        loan_term_months:
          type: integer
          nullable: true
        delivery_district:
          type: string
          nullable: true
        delivery_address:
          type: string
          nullable: true
        delivery_notes:
          type: string
          nullable: true

    RecordPaymentDto:
      type: object
      required: [amount, payment_method, payment_type]
      properties:
        amount:
          $ref: '#/components/schemas/BdtAmount'
        payment_method:
          $ref: '#/components/schemas/PaymentMethod'
        payment_type:
          type: string
          enum: [deposit, instalment, final, refund]
        reference_no:
          type: string
          nullable: true
        notes:
