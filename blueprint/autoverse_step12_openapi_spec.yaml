  - name: Automation
    description: WhatsApp, Facebook, social, email, SMS automation rules and logs
  - name: Marketplace
    description: Public vehicle search, listing detail, buyer enquiries
  - name: IMV
    description: Intelligent Market Value pricing engine
  - name: Website
