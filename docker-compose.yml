version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: garisale-postgres
    environment:
      POSTGRES_DB: garisale
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secure_postgres_password_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garisale"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: garisale-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: garisale-meilisearch
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=super_secure_meili_master_key_2026
    ports:
      - "7700:7700"
    volumes:
      - meilidata:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
  meili_data:
